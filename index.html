<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Maze Solve</title>
</head>
<body>
    <canvas id="canv"></canvas>
    <script src="mechanics.js"></script>
    <script src="Maze.js"></script>
    <script src="SolvingAI.js"></script>
    <script src="script.js" defer></script>
    <div id="menu">
        <div id="bar">
            <div class="btn" id="import">
                <img src="https://www.svgrepo.com/show/66883/data-import-interface-symbol.svg" width="50px" height="50px">
            </div>
            <div class="btn" id="settings">
                <img src="https://www.svgrepo.com/show/60515/edit.svg" width="35px" height="35px">
            </div>
        </div>
        <div class="content">
            <h1>IMPORT MAZE IMAGE HERE:</h1>
            <input type="file">
        </div>
        <div class="content">
            <div>
                <h1>DISPLAY SPEED:</h1>
                <input type="text" placeholder="ENTER DISPLAY SPEED." value="50">
                <button>Submit</button>
            </div>
        </div>
    </div>
</body>
</html>
